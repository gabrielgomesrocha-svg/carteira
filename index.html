<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira Gabriel — Dashboard</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root{
  --bg:#f5f6f8; --bg2:#edeff2; --card:#ffffff; --card2:#f2f3f6;
  --border:#e1e4e9; --txt:#33373d; --muted:#878d96;
  --orange:#a3556a; --orange2:#84394e; --blue:#5b7a99; --green:#3f8a58; --red:#c0564a; --yellow:#9aa3ad;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;scroll-padding-top:120px}
header{background:linear-gradient(135deg,#fcfdfe,#edeff3);border-bottom:2px solid var(--orange);padding:16px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(40,45,55,.07)}
header h1{font-size:1.25rem;letter-spacing:.5px}
header h1 span{color:var(--orange)}
header .sub{color:var(--muted);font-size:.8rem;margin-top:4px}
nav{display:flex;gap:6px;flex-wrap:wrap;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;z-index:49}
nav button{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:.85rem;transition:.2s}
nav button:hover{border-color:var(--orange);color:var(--txt)}
nav button.active{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:700}
main{padding:24px 16px;max-width:100%;margin:0;box-sizing:border-box}
.tab{display:none}.tab.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 6px rgba(40,45,55,.06)}
.kpi .lbl{color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.8px}
.kpi .val{font-size:1.45rem;font-weight:700;margin-top:6px}
.kpi .det{font-size:.78rem;color:var(--muted);margin-top:4px}
.kpi.hl .val{color:var(--orange)}
.pos{color:var(--green)} .neg{color:var(--red)} .neu{color:var(--yellow)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 16px;margin-bottom:20px;box-shadow:0 1px 6px rgba(40,45,55,.06)}
.panel h2{font-size:.95rem;color:var(--orange2);margin-bottom:14px;letter-spacing:.4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.chartbox{position:relative;height:300px}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{color:var(--muted);font-weight:600;text-align:right;padding:5px 6px;border-bottom:1px solid var(--border);text-transform:uppercase;font-size:.7rem;letter-spacing:.5px}
th:first-child,td:first-child{text-align:left}
td{padding:5px 6px;border-bottom:1px solid #eef0f3;text-align:right;white-space:nowrap;font-size:.75rem}
tr.group td{background:var(--card2);color:var(--orange2);font-weight:700;font-size:.78rem;letter-spacing:.5px}
tr.subtotal td{font-weight:700;border-top:1px solid var(--border)}
tr.total td{background:#e9ebef;font-weight:800;color:var(--orange2)}
.tablewrap{overflow-x:auto;width:100%}
.barmeta{display:flex;align-items:center;gap:10px;margin:8px 0}
.barmeta .nm{width:190px;font-size:.82rem;flex-shrink:0}
.barmeta .bar{flex:1;height:18px;background:#e7e9ee;border-radius:9px;overflow:hidden;position:relative}
.barmeta .fill{height:100%;background:linear-gradient(90deg,#d8c2c9,#a3556a);border-radius:9px}
.barmeta .marker{position:absolute;top:-2px;bottom:-2px;width:2px;background:#84394e}
.barmeta .pc{width:160px;font-size:.8rem;text-align:right;flex-shrink:0}
.alert{display:flex;gap:12px;align-items:flex-start;background:var(--card2);border-left:4px solid var(--yellow);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.alert.acao{border-left-color:var(--red)}
.alert.resolvido{border-left-color:var(--green);opacity:.75}
.alert .tk{font-weight:800;min-width:90px}
.alert .tx{font-size:.85rem;color:var(--muted)}
.progress-goal{height:26px;background:#e7e9ee;border-radius:13px;overflow:hidden;position:relative;margin-top:8px}
.progress-goal .fill{height:100%;background:linear-gradient(90deg,#c98b9b,#a3556a);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:.78rem;font-weight:800;color:#fff}
footer{text-align:center;color:var(--muted);font-size:.75rem;padding:24px}
#retiradasGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;}
@media(max-width:1200px){#retiradasGrid{grid-template-columns:repeat(3,minmax(0,1fr));}}
@media(max-width:800px){#retiradasGrid{grid-template-columns:repeat(2,minmax(0,1fr));}}
#err{display:none;background:#fbe9e6;border:1px solid var(--red);border-radius:10px;padding:16px;margin:24px;color:#8a3a30}
</style>
</head>
<body>
<div id="tokenModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center">
  <div style="background:var(--card);border-radius:14px;padding:28px 32px;max-width:480px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)">
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px">🔑 Token GitHub</div>
    <div style="font-size:.85rem;color:var(--muted);margin-bottom:16px">Para salvar custos diretamente no site, informe seu Personal Access Token do GitHub. Ele ficará salvo apenas neste navegador.</div>
    <input id="tokenInput" type="password" placeholder="github_pat_..." style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--bg2);color:var(--txt);margin-bottom:12px">
    <div style="display:flex;gap:10px">
      <button onclick="salvarToken()" style="background:var(--orange);color:#fff;border:none;border-radius:8px;padding:10px 22px;cursor:pointer;font-weight:700;flex:1">Salvar</button>
      <button onclick="fecharTokenModal()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:10px 18px;cursor:pointer;color:var(--muted)">Cancelar</button>
    </div>
    <div id="tokenStatus" style="font-size:.8rem;color:var(--red);margin-top:8px"></div>
  </div>
</div>
<header>
  <h1>CARTEIRA <span>GABRIEL GOMES ROCHA</span></h1>
  <div class="sub" id="headsub">Carregando…</div>
</header>
<nav id="nav"></nav>
<div id="err"></div>
<main id="main"></main>
<footer>Fonte: Relatório Inter Win · Dashboard estático em GitHub Pages · Dados em <code>dados.js</code></footer>

<script>
const fBRL=v=>v==null?'—':v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fBRL0=v=>v==null?'—':'R$ '+Math.round(v).toLocaleString('pt-BR');
const fC=v=>v==null||v===0?'—':'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
const fPct=(v,d=2)=>v==null?'—':v.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d})+'%';
const cls=v=>v==null?'':(v>0?'pos':v<0?'neg':'');
const COLORS=['#a3556a','#5b7a99','#7a8450','#c98b9b','#9aa3ad','#c0564a','#5f9ea0','#b8bec6'];
Chart.defaults.color='#878d96';Chart.defaults.borderColor='#e1e4e9';Chart.defaults.font.family="'Segoe UI',sans-serif";

const TABS=[['dash','Dashboard'],['rent','Rentabilidade'],['pos','Posição'],['ganhos','Ganhos'],['evo','Evolução'],['div','Dividendos'],['estr','Estratégia & Alertas'],['custos','Custos'],['resultado','Resultado'],['papeis','Papéis']];

(function(){
  const s=document.createElement('script');
  s.src='dados.js?v='+Date.now();
  s.onload=()=>{ if(typeof DADOS!=='undefined'){ render(DADOS); } else { showErr('dados.js carregou mas a variável DADOS não foi encontrada. O arquivo deve começar com: var DADOS = { ... };'); } };
  s.onerror=()=>showErr('Não foi possível carregar dados.js. Verifique se o arquivo está na mesma pasta do index.html.');
  document.head.appendChild(s);
  function showErr(msg){ const e=document.getElementById('err'); e.style.display='block'; e.textContent='Erro: '+msg; document.getElementById('headsub').textContent='Falha ao carregar dados'; }
})();

function render(D){
  const ult=D.evolucaoMensal[D.evolucaoMensal.length-1];
  document.getElementById('headsub').textContent=`Fonte: ${D.meta.fonte} · Referência: ${D.meta.mesReferencia} · Atualizado em ${D.meta.atualizadoEm} · Meta: ${fBRL0(D.meta.metaPatrimonio)} até ${D.meta.metaPrazo}`;

  const nav=document.getElementById('nav');
  const main=document.getElementById('main');
  TABS.forEach(([id,nm],i)=>{
    const b=document.createElement('button');b.textContent=nm;b.dataset.t=id;if(i===0)b.classList.add('active');
    b.onclick=()=>{document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');};
    nav.appendChild(b);
    const d=document.createElement('div');d.className='tab'+(i===0?' active':'');d.id='tab-'+id;main.appendChild(d);
  });

  /* ===== DASHBOARD ===== */
  const progresso=ult.patrimonio/D.meta.metaPatrimonio*100;
  const ganhos2026=D.evolucaoMensal.filter(m=>m.mes.includes('2026')).reduce((s,m)=>s+(m.ganhos||0),0);
  document.getElementById('tab-dash').innerHTML=`
  <div class="cards">
    <div class="kpi hl"><div class="lbl">Patrimônio (${ult.mes})</div><div class="val">${fBRL0(ult.patrimonio)}</div><div class="det">Meta: ${fBRL0(D.meta.metaPatrimonio)} (${D.meta.metaPrazo})</div></div>
    <div class="kpi"><div class="lbl">Rent. no mês</div><div class="val ${cls(ult.rentMes)}">${fPct(ult.rentMes)}</div><div class="det">CDI ${fPct((Math.pow(1+ult.selic/100,1/12)-1)*100)} no mês</div></div>
    <div class="kpi"><div class="lbl">Rent. 12 meses</div><div class="val pos">${fPct(ult.rent12m)}</div><div class="det">${fPct(ult.pctCdi12m,1)} do CDI</div></div>
    <div class="kpi"><div class="lbl">Ganhos no mês</div><div class="val pos">${fBRL0(ult.ganhos)}</div><div class="det">Acumulado 2026: ${fBRL0(ganhos2026)}</div></div>
    <div class="kpi"><div class="lbl">Desde início (${D.meta.inicioCarteira})</div><div class="val pos">${fPct(D.posicaoDetalhada.total.desdeInicio)}</div><div class="det">Ganho total: ${fBRL0(D.ganhosPorEstrategia.find(g=>g.estrategia==='TOTAL').desdeInicio)}</div></div>
    ${(()=>{
      // Aporte necessário para atingir meta
      const meta=D.meta.metaPatrimonio;
      const atual=ult.patrimonio;
      const prazoMeses=(()=>{const[m,a]=D.meta.metaPrazo.split('/');const mmap={'Jan':1,'Fev':2,'Mar':3,'Abr':4,'Mai':5,'Jun':6,'Jul':7,'Ago':8,'Set':9,'Out':10,'Nov':11,'Dez':12};const now=new Date();return Math.max(1,(parseInt(a)-now.getFullYear())*12+(mmap[m]-now.getMonth()-1));})();
      const rentMensal=0.12/12; // fixo 12% a.a. conforme configuração
      // PMT formula: aporte = (FV - PV*(1+r)^n) * r / ((1+r)^n - 1)
      const fv=meta, pv=atual, r=rentMensal, n=prazoMeses;
      const fator=Math.pow(1+r,n);
      const aporte=(fv-pv*fator)*r/(fator-1);
      return aporte>0?`<div class="kpi"><div class="lbl">Aporte Necessário/mês</div><div class="val" style="font-size:1.1rem">${fBRL0(aporte)}</div><div class="det">Para atingir meta em ${D.meta.metaPrazo} com rent. 12% a.a.</div></div>`:'';
    })()}
  </div>
  <div class="panel"><h2>▌ PROGRESSO DA META — ${fBRL0(D.meta.metaPatrimonio)}</h2>
    <div class="progress-goal"><div class="fill" style="width:${Math.min(progresso,100)}%">${fPct(progresso,1)}</div></div>
    <div style="margin-top:8px;font-size:.8rem;color:var(--muted)">Faltam ${fBRL0(D.meta.metaPatrimonio-ult.patrimonio)} até ${D.meta.metaPrazo}</div>
  </div>
  <div class="grid2">
    <div class="panel"><h2>📈 EVOLUÇÃO DO PATRIMÔNIO</h2><div class="chartbox"><canvas id="cPatr"></canvas></div></div>
    <div class="panel"><h2>📊 ALOCAÇÃO ATUAL — ${D.alocacao.mesAtual}</h2><div class="chartbox"><canvas id="cAloc"></canvas></div></div>
  </div>
  <div class="panel"><h2>🎯 ALOCAÇÃO vs META</h2><div id="alocMeta"></div></div>`;

  // Build meta projection line
const metaLabels=[...D.evolucaoMensal.map(m=>m.mes)];
const metaVals=D.evolucaoMensal.map((m,i)=>{
  // linear interpolation from start to meta
  const total=D.evolucaoMensal.length;
  const metaFinal=D.meta.metaPatrimonio;
  const start=D.evolucaoMensal[0].patrimonio;
  return Math.round(start+(metaFinal-start)*(i/(total-1||1)));
});
new Chart(cPatr,{type:'line',data:{labels:D.evolucaoMensal.map(m=>m.mes),datasets:[
  {label:'Patrimônio',data:D.evolucaoMensal.map(m=>m.patrimonio),borderColor:'#a3556a',backgroundColor:'rgba(163,85,106,.12)',fill:true,tension:.3,pointRadius:4},
  {label:'Meta (linear)',data:metaVals,borderColor:'#3f8a58',backgroundColor:'transparent',borderDash:[6,3],tension:0,pointRadius:0,borderWidth:1.5}
]},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}},scales:{y:{ticks:{callback:v=>v>=1000000?'R$ '+(v/1000000).toFixed(0)+'M':v>=1000?'R$ '+(v/1000).toFixed(0)+'k':'R$ '+v},stepSize:1000000}}}});
  new Chart(cAloc,{type:'doughnut',data:{labels:D.alocacao.classes.map(c=>c.classe),datasets:[{data:D.alocacao.classes.map(c=>c.saldo),backgroundColor:COLORS,borderColor:'#ffffff',borderWidth:2}]},options:{maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:c=>` ${c.label}: ${fBRL0(c.raw)} (${(c.raw/ult.patrimonio*100).toFixed(2)}%)`}}}}});
  document.getElementById('alocMeta').innerHTML=D.alocacao.classes.map(c=>`
    <div class="barmeta"><div class="nm">${c.classe}</div>
    <div class="bar"><div class="fill" style="width:${Math.min(c.pct/Math.max(c.metaPct*1.4,10)*100,100)}%"></div>${c.metaPct?`<div class="marker" style="left:${Math.min(c.metaPct/Math.max(c.metaPct*1.4,10)*100,100)}%"></div>`:''}</div>
    <div class="pc">${fBRL0(c.saldo)}<br><span style="color:var(--muted);font-size:.72rem">${fPct(c.pct)} / meta ${c.metaPct}%</span></div></div>`).join('');

  /* ===== RENTABILIDADE ===== */
  const mesesN=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const matriz=(rows,fmt)=>`<div class="tablewrap"><table><tr><th>Ano</th>${mesesN.map(m=>`<th>${m}</th>`).join('')}<th>Ano</th><th>Acum.</th></tr>
    ${rows.map(r=>`<tr><td><b>${r.ano}</b></td>${r.meses.map(v=>`<td class="${cls(v)}">${v==null?'—':fmt(v)}</td>`).join('')}<td><b>${fmt(r.ano_pct)}</b></td><td><b>${fmt(r.acum_pct)}</b></td></tr>`).join('')}</table></div>`;
  document.getElementById('tab-rent').innerHTML=`
  <div class="panel"><h2>▌ RENTABILIDADES MENSAIS (%)</h2>${matriz(D.rentabilidadeMensal.anos,v=>fPct(v))}</div>
  <div class="panel"><h2>▌ % DO CDI POR MÊS</h2>${matriz(D.pctCdiAnual.anos,v=>v.toLocaleString('pt-BR',{maximumFractionDigits:1}))}</div>
  <div class="grid2">
    <div class="panel"><h2>▌ COMPARATIVO DE PERÍODOS (${D.meta.mesReferencia})</h2>
      <table><tr><th>Período</th><th>Carteira</th><th>CDI</th><th>% CDI</th><th>Vol.</th></tr>
      ${D.comparativoPeriodos.map(p=>`<tr><td>${p.periodo}</td><td class="pos">${fPct(p.carteira)}</td><td>${fPct(p.cdi)}</td><td>${fPct(p.pctCdi,1)}</td><td>${fPct(p.vol)}</td></tr>`).join('')}</table></div>
    <div class="panel"><h2>📈 CARTEIRA vs CDI (12m móvel %)</h2><div class="chartbox"><canvas id="cCdi"></canvas></div></div>
  </div>`;
  new Chart(cCdi,{type:'bar',data:{labels:D.evolucaoMensal.map(m=>m.mes),datasets:[{label:'% do CDI 12m',data:D.evolucaoMensal.map(m=>m.pctCdi12m),backgroundColor:D.evolucaoMensal.map(m=>m.pctCdi12m>=100?'#3f8a58':'#c0564a'),borderRadius:5}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{suggestedMin:80}}}});

  /* ===== POSIÇÃO ===== */
  const P=D.posicaoDetalhada;
  document.getElementById('tab-pos').innerHTML=`
  <div class="panel"><h2>▌ POSIÇÃO DETALHADA POR ATIVO — ${P.mesReferencia}</h2>
  <div class="tablewrap"><table>
  <tr><th>Ativo</th><th>Saldo Anterior</th><th>Aplicações</th><th>Resgates</th><th>Saldo Atual</th><th>Rent. Mês</th><th>Rent. 12m</th><th>Desde Início</th><th>Part.</th></tr>
  ${P.grupos.map(g=>`
    <tr class="group"><td colspan="9">${g.grupo}</td></tr>
    ${g.ativos.map(a=>`<tr><td>${a.ativo}</td><td>${fBRL(a.saldoAnt)}</td><td>${a.aplicacoes?fBRL(a.aplicacoes):'—'}</td><td>${a.resgates?fBRL(a.resgates):'—'}</td><td><b>${fBRL(a.saldo)}</b></td><td class="${cls(a.rentMes)}">${fPct(a.rentMes)}</td><td class="${cls(a.rent12m)}">${fPct(a.rent12m)}</td><td class="${cls(a.desdeInicio)}">${fPct(a.desdeInicio)}</td><td>${fPct(a.part)}</td></tr>`).join('')}
    <tr class="subtotal"><td>Sub-total</td><td>${fBRL(g.subtotal.saldoAnt)}</td><td>${g.subtotal.aplicacoes?fBRL(g.subtotal.aplicacoes):'—'}</td><td>${g.subtotal.resgates?fBRL(g.subtotal.resgates):'—'}</td><td>${fBRL(g.subtotal.saldo)}</td><td colspan="4"></td></tr>`).join('')}
  <tr class="total"><td>TOTAL CARTEIRA</td><td>${fBRL(P.total.saldoAnt)}</td><td>${fBRL(P.total.aplicacoes)}</td><td>${fBRL(P.total.resgates)}</td><td>${fBRL(P.total.saldo)}</td><td>${fPct(P.total.rentMes)}</td><td>${fPct(P.total.rent12m)}</td><td>${fPct(P.total.desdeInicio)}</td><td>100%</td></tr>
  </table></div></div>`;

  /* ===== GANHOS ===== */
  document.getElementById('tab-ganhos').innerHTML=`
  <div class="panel"><h2>▌ GANHOS FINANCEIROS POR ESTRATÉGIA (R$)</h2>
  <div class="tablewrap"><table><tr><th>Estratégia</th><th>No Mês</th><th>No Ano</th><th>3 meses</th><th>6 meses</th><th>12 meses</th><th>Desde ${D.meta.inicioCarteira}</th></tr>
  ${D.ganhosPorEstrategia.map(g=>`<tr class="${g.estrategia==='TOTAL'?'total':''}"><td>${g.estrategia}</td><td class="${cls(g.noMes)}">${fBRL(g.noMes)}</td><td class="${cls(g.noAno)}">${fBRL(g.noAno)}</td><td class="${cls(g.m03)}">${fBRL(g.m03)}</td><td class="${cls(g.m06)}">${fBRL(g.m06)}</td><td class="${cls(g.m12)}">${fBRL(g.m12)}</td><td class="${cls(g.desdeInicio)}">${fBRL(g.desdeInicio)}</td></tr>`).join('')}</table></div></div>
  <div class="grid2">
    <div class="panel"><h2>💰 GANHOS MENSAIS (R$)</h2><div class="chartbox"><canvas id="cGan"></canvas></div></div>
    <div class="panel"><h2>🏆 GANHOS POR ESTRATÉGIA — DESDE INÍCIO</h2><div class="chartbox"><canvas id="cGanE"></canvas></div></div>
  </div>
  <div class="panel"><h2>▌ HISTÓRICO MENSAL POR ESTRATÉGIA (R$)</h2>
  <div class="tablewrap"><table><tr><th>Estratégia</th>${D.ganhosMensaisPorEstrategia.meses.map(m=>`<th>${m}</th>`).join('')}</tr>
  ${D.ganhosMensaisPorEstrategia.linhas.map(l=>`<tr><td>${l.estrategia}</td>${l.valores.map(v=>`<td class="${cls(v)}">${v==null?'—':fBRL(v)}</td>`).join('')}</tr>`).join('')}</table></div></div>`;
  new Chart(cGan,{type:'bar',data:{labels:D.evolucaoMensal.map(m=>m.mes),datasets:[{data:D.evolucaoMensal.map(m=>m.ganhos),backgroundColor:'#5b7a99',borderRadius:5}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}}}}});

function renderFormFields(detalhe,pago){
  const pagoSet=pago||{};
  document.getElementById('formFields').innerHTML=CAMPOS_CUSTOS.map(c=>{
    const val=detalhe[c.key]||0;
    const isPago=pagoSet[c.key]||false;
    const badge=c.tipo==='individual'?'<span style="font-size:.68rem;background:#f2f3f6;border-radius:4px;padding:1px 5px;color:#a3556a;margin-left:4px">100% seu</span>':'<span style="font-size:.68rem;background:#f2f3f6;border-radius:4px;padding:1px 5px;color:#5b7a99;margin-left:4px">total</span>';
    return `<div style="position:relative"><div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">${c.label}${badge}</div>
    <input id="f_${c.key}" type="number" step="0.01" value="${val}" onchange="atualizarSubtotalPago()" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--card);color:var(--txt)">
    <label style="display:flex;align-items:center;gap:5px;margin-top:5px;font-size:.75rem;color:var(--muted);cursor:pointer">
      <input type="checkbox" id="p_${c.key}" ${isPago?'checked':''} onchange="atualizarSubtotalPago()" style="accent-color:var(--green);width:14px;height:14px"> Pago
    </label></div>`;
  }).join('');
  // Inject subtotal bar after fields render
  setTimeout(atualizarSubtotalPago, 50);
}

function atualizarSubtotalPago(){
  const bar = document.getElementById('subtotalPago');
  if(!bar) return;
  let pago=0, total=0, totalCasa=0;
  CAMPOS_CUSTOS.forEach(c=>{
    const inp = document.getElementById('f_'+c.key);
    const chk = document.getElementById('p_'+c.key);
    if(!inp||!chk) return;
    const val = parseFloat(inp.value)||0;
    const meuVal = c.tipo==='individual' ? val : val/2;
    total += meuVal;
    totalCasa += val;
    if(chk.checked) pago += meuVal;
  });
  const falta = total - pago;
  const pct = total>0 ? Math.round(pago/total*100) : 0;
  const pagoCasa=0; // calculated below
  // recalc for casa: pago casa = items marked as pago at full value
  let pagoCasaVal=0, faltaCasa=0;
  CAMPOS_CUSTOS.forEach(c=>{
    const inp2=document.getElementById('f_'+c.key);
    const chk2=document.getElementById('p_'+c.key);
    if(!inp2||!chk2)return;
    const v2=parseFloat(inp2.value)||0;
    if(chk2.checked)pagoCasaVal+=v2; else faltaCasa+=v2;
  });
  const pctCasa=totalCasa>0?Math.round(pagoCasaVal/totalCasa*100):0;

  function linhaSubtotal(lbl,pagoV,faltaV,totalV,pctV){
    return `<div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;padding:10px 14px;background:var(--card);border-radius:8px;margin-bottom:8px">
      <div style="font-size:.72rem;color:var(--muted);font-weight:700;min-width:60px;text-transform:uppercase">${lbl}</div>
      <div><span style="font-size:.7rem;color:var(--muted);display:block">✅ Pago</span><span style="font-size:1rem;font-weight:700;color:var(--green)">${fBRL0(pagoV)}</span></div>
      <div><span style="font-size:.7rem;color:var(--muted);display:block">⏳ Falta</span><span style="font-size:1rem;font-weight:700;color:var(--red)">${fBRL0(faltaV)}</span></div>
      <div><span style="font-size:.7rem;color:var(--muted);display:block">📋 Total</span><span style="font-size:1rem;font-weight:700;color:var(--txt)">${fBRL0(totalV)}</span></div>
      <div style="flex:1;min-width:140px">
        <div style="font-size:.7rem;color:var(--muted);margin-bottom:3px">${pctV}% pago</div>
        <div style="height:8px;background:#e7e9ee;border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${pctV}%;background:var(--green);border-radius:4px;transition:width .3s"></div>
        </div>
      </div>
    </div>`;
  }

  bar.innerHTML =
    linhaSubtotal('Pessoal', pago, falta, total, pct) +
    linhaSubtotal('Casa', pagoCasaVal, faltaCasa, totalCasa, pctCasa);
}

function cancelarForm(){document.getElementById('formCustos').style.display='none';__editIdx=null;}

async function excluirMes(idx){
  const m=DADOS.custos[idx];
  if(!confirm(`Excluir o mês ${m.mes}?\nEsta ação não pode ser desfeita.`))return;
  const backup=[...DADOS.custos];
  DADOS.custos.splice(idx,1);
  const ok=await pushDadosGitHub();
  if(ok){renderCustos(DADOS);}
  else{alert('Erro ao excluir. Tente novamente.');DADOS.custos=backup;}
}

function calcTotais(d){
  const comp=['cartaoConj','contaCorrente','condominio','iptu','escola','paty','personal','inglesLis','ipva'];
  const ind=['parcelaAp','cartaoInd','haras'];
  let casa=0; comp.forEach(k=>{casa+=(d[k]||0);});
  let pess=casa/2; ind.forEach(k=>{pess+=(d[k]||0);});
  return{custoCasa:Math.round(casa*100)/100,custoPessoal:Math.round(pess*100)/100};
}

async function salvarMes(){
  const mes=document.getElementById('formTitle').dataset.mes;
  const status=document.getElementById('formStatus');
  const detalhe={};
  const pago={};
  CAMPOS_CUSTOS.forEach(c=>{
    detalhe[c.key]=parseFloat(document.getElementById('f_'+c.key).value)||0;
    pago[c.key]=document.getElementById('p_'+c.key).checked;
  });
  const{custoCasa,custoPessoal}=calcTotais(detalhe);
  const novoItem={mes,custoCasa,custoPessoal,detalhe,pago};
  if(!DADOS.custos)DADOS.custos=[];
  const backup=[...DADOS.custos];
  if(__editIdx!==null){DADOS.custos[__editIdx]=novoItem;}else{DADOS.custos.push(novoItem);}
  status.textContent='⏳ Salvando no GitHub...';
  const ok=await pushDadosGitHub();
  if(ok){status.textContent='✅ Salvo!';document.getElementById('formCustos').style.display='none';renderCustos(DADOS);}
  else{status.textContent='❌ Erro ao salvar.';DADOS.custos=backup;}
}

async function pushDadosGitHub(){
  const TOKEN=localStorage.getItem('gh_token')||'';
  const REPO='gabrielgomesrocha-svg/carteira';
  const FILE='dados.js';
  try{
    const mr=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{headers:{'Authorization':'Bearer '+TOKEN,'Accept':'application/vnd.github+json'}});
    const meta=await mr.json();
    const content='var DADOS = '+JSON.stringify(DADOS,null,2)+';\n';
    const b64=btoa(unescape(encodeURIComponent(content)));
    const pr=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{method:'PUT',headers:{'Authorization':'Bearer '+TOKEN,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify({message:`Custos — ${new Date().toLocaleDateString('pt-BR')}`,content:b64,sha:meta.sha})});
    return pr.ok;
  }catch(e){return false;}
}

  localStorage.setItem('gh_token',t);

function proximoTrimestre(ultimo){
  const map={'T1':'T2','T2':'T3','T3':'T4','T4':'T1'};
  const m={'T1':['Jan','Fev','Mar'],'T2':['Abr','Mai','Jun'],'T3':['Jul','Ago','Set'],'T4':['Out','Nov','Dez']};
  const [t,a]=ultimo.trimestre.split('/');
  const prox=map[t];
  const ano=prox==='T1'?parseInt(a)+1:parseInt(a);
  const meses=m[prox].map(ms=>`${ms}/${ano}`);
  return{trimestre:`${prox}/${ano}`,meses,valor:0};
}

function renderResultado(D){

  const custos=D.custos||[];

  custos.forEach(m=>{custoMap[m.mes]=m.custoPessoal;});

  const rows=[];
  retiradas.forEach(t=>{
    const mensal=t.valor>0?t.valor/3:null;
    t.meses.forEach(mes=>{
      const custo=custoMap[mes]||null;
      const resultado=(mensal!=null&&custo!=null)?mensal-custo:null;
      rows.push({mes,trimestre:t.trimestre,retiradaTrimestral:t.valor,retiradaMensal:mensal,custoPessoal:custo,resultado});
    });
  });

  const rowsComDados=rows.filter(r=>r.retiradaTrimestral>0&&r.custoPessoal!=null);

  // ── KPIs ──────────────────────────────────────────────────────────────────
  const mesesComResultado=rows.filter(r=>r.resultado!=null);
  const totalConsolidado=mesesComResultado.reduce((s,r)=>s+r.resultado,0);
  const mediaMenusal=mesesComResultado.length>0?totalConsolidado/mesesComResultado.length:null;
  // Taxa de poupança
  const totalEntradas=mesesComResultado.reduce((s,r)=>s+(r.retiradaMensal||0),0);
  const taxaPoupanca=totalEntradas>0?(totalConsolidado/totalEntradas*100):null;
  // Projeção anual (12 meses com média atual)
  const projecaoAnual=mediaMenusal!=null?mediaMenusal*12:null;
  // Media trimestral: group by trimestre
  const porTri={};
  mesesComResultado.forEach(r=>{
    if(!porTri[r.trimestre])porTri[r.trimestre]=0;
    porTri[r.trimestre]+=r.resultado;
  });
  const triValues=Object.values(porTri);
  const mediaTrimestral=triValues.length>0?triValues.reduce((s,v)=>s+v,0)/triValues.length:null;

  tab.innerHTML=`
  ${mesesComResultado.length>0?`
  <div class="cards" style="margin-bottom:20px">
    <div class="kpi"><div class="lbl">Lucro Médio Mensal</div><div class="val ${mediaMenusal>=0?'pos':'neg'}">${mediaMenusal!=null?fBRL0(mediaMenusal):'—'}</div><div class="det">${mesesComResultado.length} meses com dados</div></div>
    <div class="kpi"><div class="lbl">Lucro Médio Trimestral</div><div class="val ${mediaTrimestral>=0?'pos':'neg'}">${mediaTrimestral!=null?fBRL0(mediaTrimestral):'—'}</div><div class="det">${triValues.length} trimestres com dados</div></div>
    <div class="kpi hl"><div class="lbl">Total Consolidado</div><div class="val pos">${fBRL0(totalConsolidado)}</div><div class="det">Resultado acumulado até ${mesesComResultado[mesesComResultado.length-1].mes}</div></div>
    ${taxaPoupanca!=null?`<div class="kpi"><div class="lbl">Taxa de Poupança</div><div class="val ${taxaPoupanca>=0?'pos':'neg'}">${fPct(taxaPoupanca,1)}</div><div class="det">Da retirada total</div></div>`:''}
    ${projecaoAnual!=null?`<div class="kpi"><div class="lbl">Projeção Anual</div><div class="val pos">${fBRL0(projecaoAnual)}</div><div class="det">Se manter média atual de ${fBRL0(mediaMenusal)}/mês</div></div>`:''}
  </div>`:''}
  <div class="panel">
    <h2>▌ RETIRADAS TRIMESTRAIS</h2>
    <div id="retiradasGrid">
      ${retiradas.map((t,i)=>`
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative">
        <button onclick="excluirTrimestre(${i})" title="Excluir trimestre" style="position:absolute;top:8px;right:8px;background:none;border:1px solid #f5c6c6;border-radius:6px;padding:2px 7px;cursor:pointer;font-size:.75rem;color:var(--red)">🗑️</button>

        <div style="display:flex;align-items:center;gap:8px">

            style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:1rem;font-weight:700;background:var(--card);color:var(--txt)">
          <button onclick="salvarRetirada(${i})" style="background:var(--orange);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:.85rem">✓</button>

    <div class="tablewrap"><table>

  </div>`:'<div class="panel" style="text-align:center;color:var(--muted);padding:40px">Informe as retiradas trimestrais acima para ver o resultado.</div>'}`;

async function adicionarTrimestre(){
  const ultimo=DADOS.retiradas[DADOS.retiradas.length-1];
  const novo=proximoTrimestre(ultimo);
  DADOS.retiradas.push(novo);
  const ok=await pushDadosGitHub();
  if(ok){renderResultado(DADOS);}
  else{DADOS.retiradas.pop();alert('Erro ao salvar. Tente novamente.');}
}

async function excluirTrimestre(idx){
  const t=DADOS.retiradas[idx];
  if(!confirm(`Excluir ${t.trimestre}?\nEsta ação não pode ser desfeita.`))return;
  const backup=[...DADOS.retiradas];
  DADOS.retiradas.splice(idx,1);
  const ok=await pushDadosGitHub();
  if(ok){renderResultado(DADOS);}
  else{alert('Erro ao excluir.');DADOS.retiradas=backup;}
}

async function salvarRetirada(idx){
  const val=parseFloat(document.getElementById('ret_'+idx).value)||0;
  const status=document.getElementById('retStatus_'+idx);
  DADOS.retiradas[idx].valor=val;
  status.textContent='⏳ Salvando...';
  const ok=await pushDadosGitHub();
  if(ok){
    status.textContent='✅ Salvo!';
    renderResultado(DADOS);
    setTimeout(()=>{status.textContent='';},3000);
  } else {
    status.textContent='❌ Erro ao salvar.';
    DADOS.retiradas[idx].valor=0;
  }
}

function gerarAlertasAuto(D){
  const alertas=[];
  const ult=D.evolucaoMensal[D.evolucaoMensal.length-1];
  const pen=D.evolucaoMensal.length>1?D.evolucaoMensal[D.evolucaoMensal.length-2]:null;

  // ── Regra 1: Ativo com rent. mês ou 12m negativa ──────────────────────────
  if(D.posicaoDetalhada&&D.posicaoDetalhada.grupos){
    D.posicaoDetalhada.grupos.forEach(g=>{
      g.ativos.forEach(a=>{
        if(a.saldo>0){
          if(a.rentMes!=null&&a.rentMes<0){
            alertas.push({ativo:a.ativo,nivel:'atencao',texto:`Rentabilidade negativa no mês: ${fPct(a.rentMes)}. Monitorar.`});
          } else if(a.rent12m!=null&&a.rent12m<0){
            alertas.push({ativo:a.ativo,nivel:'acao',texto:`Rentabilidade negativa em 12 meses: ${fPct(a.rent12m)}. Avaliar saída.`});
          }
        }
      });
    });
  }

  // ── Regra 2: Classe fora da meta (desvio > 3 p.p.) ───────────────────────
  if(D.alocacao&&D.alocacao.classes){
    D.alocacao.classes.forEach(c=>{
      if(c.metaPct===0)return;
      const desvio=c.pct-c.metaPct;
      if(desvio>3){
        alertas.push({ativo:c.classe,nivel:'atencao',texto:`Alocação acima da meta: ${fPct(c.pct)} (meta ${fPct(c.metaPct)}, desvio +${fPct(desvio,1)}). Considerar rebalanceamento.`});
      } else if(desvio<-3){
        alertas.push({ativo:c.classe,nivel:'atencao',texto:`Alocação abaixo da meta: ${fPct(c.pct)} (meta ${fPct(c.metaPct)}, desvio ${fPct(desvio,1)}). Considerar aporte.`});
      }
    });
  }

  // ── Regra 3: Prefixado abaixo de 100% CDI no mês ─────────────────────────
  if(ult.pctCdi12m!=null&&ult.pctCdi12m<100){
    alertas.push({ativo:'Carteira',nivel:'atencao',texto:`Rentabilidade 12m abaixo de 100% do CDI: ${fPct(ult.pctCdi12m,1)}. Revisar estratégia de alocação.`});
  }

  // ── Regra 4: Custo pessoal acima da retirada mensal ──────────────────────
  if(D.retiradas&&D.custos){
    const custoMap={};
    D.custos.forEach(m=>{custoMap[m.mes]=m.custoPessoal;});
    D.retiradas.forEach(t=>{
      if(t.valor===0)return;
      const mensal=t.valor/3;
      t.meses.forEach(mes=>{
        const custo=custoMap[mes];
        if(custo&&custo>mensal){
          alertas.push({ativo:mes,nivel:'acao',texto:`Custo pessoal (${fBRL0(custo)}) maior que retirada mensal (${fBRL0(mensal)}). Resultado negativo em ${fBRL0(custo-mensal)}.`});
        }
      });
    });
  }

  // ── Regra 5: Patrimônio caindo 2 meses consecutivos ──────────────────────
  const evo=D.evolucaoMensal;
  if(evo.length>=3){
    const m1=evo[evo.length-1];const m2=evo[evo.length-2];const m3=evo[evo.length-3];
    // Compare patrimônio desconsiderando aportes/resgates (usar ganhos)
    if(m1.ganhos<0&&m2.ganhos<0){
      alertas.push({ativo:'Patrimônio',nivel:'acao',texto:`Ganhos financeiros negativos por 2 meses consecutivos (${m2.mes}: ${fBRL0(m2.ganhos)}, ${m1.mes}: ${fBRL0(m1.ganhos)}). Revisar carteira.`});
    }
  }

  // ── Regra 6: Spread financiamento em risco (rent 12m < 14%) ─────────────
  if(ult.rent12m!=null&&ult.rent12m<14){
    alertas.push({ativo:'Financiamento',nivel:'acao',texto:`Rentabilidade 12m (${fPct(ult.rent12m)}) abaixo do CET do financiamento (12,59%). Spread negativo — reavaliar manutenção da dívida.`});
  }

  return alertas;
}

  <div class="panel">
    <h2>▌ TABELA DE EVOLUÇÃO — TODOS OS PAPÉIS</h2>
    <div class="tablewrap"><table>
      <tr><th>Papel</th><th>Classe</th><th>Taxa Contratada</th><th>Vencimento</th>${allMeses.map(m=>`<th>${m}</th>`).join('')}<th>Var. %</th></tr>
      ${papeis.map(p=>{
        const vals=allMeses.map(m=>p.historico[m]||null);
        const first=vals.find(v=>v!=null);
        const last=[...vals].reverse().find(v=>v!=null);
        const varpct=(first&&last&&first>0)?((last-first)/first*100):null;
        return `<tr>
          <td style="white-space:normal;max-width:200px;font-size:.78rem"><b>${p.ativo.replace(' (Isento)','')}</b></td>
          <td style="font-size:.72rem;color:var(--muted)">${p.classe.replace('FIIs — FUNDOS LISTADOS','FIIs').replace('RENDA VARIÁVEL — AÇÕES','Ações').replace('INFLAÇÃO (IPCA+)','IPCA+')}</td>
          <td style="font-size:.78rem;color:var(--orange)">${p.taxa||'—'}</td>
          <td style="font-size:.78rem;color:var(--muted);white-space:nowrap">${p.venc?(p.venc==='TODAY'?'Liquidez Diária':new Date(p.venc).toLocaleDateString('pt-BR')):'—'}</td>
          ${vals.map(v=>`<td>${v!=null?fC(v):'—'}</td>`).join('')}
          <td class="${varpct!=null?(varpct>=0?'pos':'neg'):''}">${varpct!=null?fPct(varpct,1):'—'}</td>
        </tr>`;}).join('')}
    </table></div>
  </div>`;

  // Init chart — show first category by default
  window.__chartPapel = null;
  setTimeout(()=>selecionarCategoria('todas'), 100);

  // ── Vencimentos chart ────────────────────────────────────────────────────
  const hoje = new Date();
  const hojeStr = hoje.toISOString().split('T')[0];
  const papeisComVenc = papeis.filter(p=>p.venc&&p.historico).map(p=>({...p, vencResolved: p.venc==='TODAY'?hojeStr:p.venc}));
  if(papeisComVenc.length>0){
    // Get latest saldo for each
    const mmap2={'Jan':1,'Fev':2,'Mar':3,'Abr':4,'Mai':5,'Jun':6,'Jul':7,'Ago':8,'Set':9,'Out':10,'Nov':11,'Dez':12};
    const pontos = papeisComVenc.map(p=>{
      const meses=Object.keys(p.historico).sort((a,b)=>{
        const [ma,ya]=a.split('/');const [mb,yb]=b.split('/');
        return (parseInt(ya)*100+mmap2[ma])-(parseInt(yb)*100+mmap2[mb]);
      });
      const saldo=p.historico[meses[meses.length-1]]||0;
      return {x:p.vencResolved||p.venc, y:saldo, label:p.ativo.replace(' (Isento)',''), taxa:p.taxa||'—', saldo, isToday:p.venc==='TODAY'};
    }).sort((a,b)=>a.x.localeCompare(b.x));

    // Concentração por ano
    const concMap={};
    papeisComVenc.forEach(p=>{
      if(!p.vencResolved||p.venc==='TODAY')return;
      const ano=p.vencResolved.substring(0,4);
      const meses2=Object.keys(p.historico||{});
      const mmap3={'Jan':1,'Fev':2,'Mar':3,'Abr':4,'Mai':5,'Jun':6,'Jul':7,'Ago':8,'Set':9,'Out':10,'Nov':11,'Dez':12};
      const ultM=meses2.sort((a,b)=>{const[ma,ya]=a.split('/');const[mb,yb]=b.split('/');return(parseInt(yb)*100+mmap3[mb])-(parseInt(ya)*100+mmap3[ma]);})[0];
      const saldo=ultM?p.historico[ultM]:0;
      concMap[ano]=(concMap[ano]||0)+saldo;
    });
    const concAnos=Object.keys(concMap).sort();
    const concVals=concAnos.map(a=>concMap[a]);
    const concCanvas=document.getElementById('cConcentracao');
    if(concCanvas&&concAnos.length>0){
      new Chart(concCanvas,{type:'bar',data:{labels:concAnos,datasets:[{data:concVals,backgroundColor:concAnos.map(a=>parseInt(a)<2028?'#c0564a':parseInt(a)<2031?'#c98a2e':'#3f8a58'),borderRadius:5}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`Saldo: ${fBRL(ctx.raw)}`}}},scales:{y:{ticks:{callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}}}}});
    }

    new Chart(document.getElementById('cVencimentos'),{
      type:'bubble',
      data:{datasets:[{
        label:'Vencimentos',
        data:pontos.map(p=>({x:new Date(p.x).getTime(), y:p.y, r:Math.max(6,Math.min(30,Math.sqrt(p.y/1000))), label:p.label, taxa:p.taxa})),
        backgroundColor:pontos.map(p=>{
          const anos=(new Date(p.x)-new Date())/31536000000;
          return anos<1?'#c0564a88':anos<3?'#c98a2e88':'#3f8a5888';
        }),
        borderColor:pontos.map(p=>{
          const anos=(new Date(p.x)-new Date())/31536000000;
          return anos<1?'#c0564a':anos<3?'#c98a2e':'#3f8a58';
        }),
        borderWidth:2
      }]},
      options:{
        maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{
            label:ctx=>{
              const d=ctx.raw;
              return [`${d.label}`,`Taxa: ${d.taxa}`,`Saldo: ${fBRL(d.y)}`,`Venc: ${d.isToday?'Liquidez Diária':new Date(d.x).toLocaleDateString('pt-BR')}`];
            }
          }}
        },
        scales:{
          x:{
            type:'time',
            time:{unit:'year',displayFormats:{year:'yyyy'}},
            title:{display:true,text:'Ano de Vencimento'}
          },
          y:{ticks:{callback:v=>'R$ '+(v/1000).toFixed(0)+'k'},title:{display:true,text:'Saldo atual'}}
        }
      }
    });
  }
}

// Selected papeis set
window.__papeisGrafico = [];

const CORES_GRAFICO = ['#a3556a','#5b7a99','#3f8a58','#c98a2e','#c0564a','#7a5c99','#f7931a','#41d2d8','#ff8c2e','#86b5d9'];

function sortMeses(meses){
  const mmap={'Jan':1,'Fev':2,'Mar':3,'Abr':4,'Mai':5,'Jun':6,'Jul':7,'Ago':8,'Set':9,'Out':10,'Nov':11,'Dez':12};
  return [...meses].sort((a,b)=>{const[ma,ya]=a.split('/');const[mb,yb]=b.split('/');return(parseInt(ya)*100+mmap[ma])-(parseInt(yb)*100+mmap[mb]);});
}

function adicionarPapelGrafico(){
  const sel = document.getElementById('selPapel').value;
  if(!sel) return;
  if(window.__papeisGrafico.includes(sel)){
    document.getElementById('papeisSelMsg').textContent='Papel já adicionado.';
    return;
  }
  window.__papeisGrafico.push(sel);
  document.getElementById('papeisSelMsg').textContent = window.__papeisGrafico.map(p=>p.replace(' (Isento)','')).join(' · ');
  desenharGraficoPapeis(window.__papeisGrafico);
}

function limparSelecao(){
  window.__papeisGrafico = [];
  document.getElementById('papeisSelMsg').textContent='';
  // Reset category buttons
  document.querySelectorAll('.catBtn').forEach(b=>{b.style.background='var(--card)';b.style.color='var(--muted)';b.style.fontWeight='';});
  const todas=document.getElementById('cat_todas');
  if(todas){todas.style.background='var(--orange)';todas.style.color='#fff';todas.style.fontWeight='700';}
  if(window.__chartPapel){window.__chartPapel.destroy();window.__chartPapel=null;}
}

function selecionarCategoria(cls){
  // Update button styles
  document.querySelectorAll('.catBtn').forEach(b=>{b.style.background='var(--card)';b.style.color='var(--muted)';b.style.fontWeight='';});
  const btnId = 'cat_'+(cls==='todas'?'todas':cls.replace(/[^a-z]/gi,'_'));
  const btn=document.getElementById(btnId);
  if(btn){btn.style.background='var(--orange)';btn.style.color='#fff';btn.style.fontWeight='700';}

  const papeis = DADOS.historicoPapeis||[];
  let selecionados;
  if(cls==='todas'){
    selecionados = papeis.map(p=>p.ativo);
  } else {
    selecionados = papeis.filter(p=>p.classe===cls).map(p=>p.ativo);
  }
  window.__papeisGrafico = selecionados;
  document.getElementById('papeisSelMsg').textContent = selecionados.length + ' papéis selecionados';
  desenharGraficoPapeis(selecionados);
}

function desenharGraficoPapeis(ativos){
  const papeis = DADOS.historicoPapeis||[];
  const selecionados = papeis.filter(p=>ativos.includes(p.ativo));
  if(!selecionados.length) return;

  // All months union
  const allM = sortMeses([...new Set(selecionados.flatMap(p=>Object.keys(p.historico||{})))]);

  const datasets = selecionados.map((p,i)=>{
    const cor = CORES_GRAFICO[i % CORES_GRAFICO.length];
    return {
      label: p.ativo.replace(' (Isento)','').substring(0,30),
      data: allM.map(m=>p.historico[m]||null),
      borderColor: cor,
      backgroundColor: cor+'33',
      fill: selecionados.length===1,
      tension: .3,
      pointRadius: 4,
      pointHoverRadius: 6,
      spanGaps: true
    };
  });

  if(window.__chartPapel) window.__chartPapel.destroy();
  window.__chartPapel = new Chart(document.getElementById('cPapelEvo'),{
    type:'line',
    data:{labels:allM, datasets},
    options:{
      maintainAspectRatio:false,
      plugins:{
        legend:{display:selecionados.length>1,position:'bottom',labels:{boxWidth:12,font:{size:11}}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fBRL(ctx.raw)}`}}
      },
      scales:{y:{ticks:{callback:v=>'R$ '+(v>=1000?(v/1000).toFixed(0)+'k':v.toFixed(0))}}}
    }
  });
}
